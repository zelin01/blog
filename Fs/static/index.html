<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>迷你博客</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 0 20px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { padding: 8px 16px; cursor: pointer; margin-right: 5px; }
        .post { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .post h3 { margin: 0 0 5px; }
        #auth-box { background: #f5f5f5; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .msg { font-size: 14px; margin: 5px 0; }
    </style>
</head>
<body>
    <!-- 未登录显示 -->
    <div id="auth-box">
        <h3>用户注册</h3>
        <input id="reg_username" placeholder="用户名">
        <input id="reg_password" type="password" placeholder="密码">
        <button onclick="register()">注册</button>
        <p id="reg_msg" class="msg"></p>

        <hr>

        <h3>用户登录</h3>
        <input id="login_username" placeholder="用户名">
        <input id="login_password" type="password" placeholder="密码">
        <button onclick="login()">登录</button>
        <p id="login_msg" class="msg"></p>
    </div>

    <!-- 已登录显示 -->
    <div id="user-box" style="display: none;">
        <p>欢迎，<span id="current_user"></span>！
        <button onclick="logout()">退出</button></p>
    </div>

    <hr>

    <h1>迷你博客</h1>
    <h3>发布文章</h3>
    <input id="title" placeholder="标题">
    <textarea id="content" placeholder="内容" rows="3"></textarea>
    <button onclick="createPost()">发布</button>

    <h3>文章列表</h3>
    <div id="posts"></div>

    <script>
        const API = "http://127.0.0.1:8000";

        // ========== 注册 ==========
        async function register() {
            const username = document.getElementById("reg_username").value;
            const password = document.getElementById("reg_password").value;

            const res = await fetch(`${API}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            const msg = document.getElementById("reg_msg");

            if (res.ok) {
                msg.style.color = "green";
                msg.innerText = "注册成功，请登录";
            } else {
                msg.style.color = "red";
                msg.innerText = data.detail || "注册失败";
            }
        }

        // ========== 登录 ==========
        async function login() {
            const username = document.getElementById("login_username").value;
            const password = document.getElementById("login_password").value;

            // OAuth2 标准格式：form-urlencoded
            const formData = new URLSearchParams();
            formData.append("username", username);
            formData.append("password", password);

            const res = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });

            const data = await res.json();
            const msg = document.getElementById("login_msg");

            if (res.ok) {
                localStorage.setItem("token", data.access_token);
                localStorage.setItem("username", username);
                showUser(username);
                msg.style.color = "green";
                msg.innerText = "登录成功";
            } else {
                msg.style.color = "red";
                msg.innerText = data.detail || "登录失败";
            }
        }

        // ========== 退出 ==========
        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            location.reload();
        }

        // ========== 显示登录状态 ==========
        function showUser(username) {
            document.getElementById("auth-box").style.display = "none";
            document.getElementById("user-box").style.display = "block";
            document.getElementById("current_user").innerText = username;
        }

        // ========== 发布文章（带 Token） ==========
        async function createPost() {
            const token = localStorage.getItem("token");
            if (!token) {
                alert("请先登录");
                return;
            }

            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;

            const res = await fetch(`${API}/posts`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ title, content })
            });

            if (res.ok) {
                document.getElementById("title").value = "";
                document.getElementById("content").value = "";
                loadPosts();
            } else {
                const data = await res.json();
                alert("发布失败：" + (data.detail || "未知错误"));
            }
        }

        // ========== 获取文章列表 ==========
        async function loadPosts() {
            const res = await fetch(`${API}/posts`);
            const posts = await res.json();
            const html = posts.map(p => `
                <div class="post">
                    <h3>${p.title}</h3>
                    <p>${p.content}</p>
                    <small>ID: ${p.id}</small>
                </div>
            `).join("");
            document.getElementById("posts").innerHTML = html || "<p>暂无文章</p>";
        }

        // 页面加载时检查登录状态
        const savedUser = localStorage.getItem("username");
        if (savedUser) {
            showUser(savedUser);
        }

        // 加载文章
        loadPosts();
    </script>
</body>
</html>
